<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan belanja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container text-center mt-5">
        <h1 class="text-uppercase">Catatan Belanja</h1>
        <ul class="nav nav-underline justify-content-center mb-5" id="navItems">
        </ul>
        
        <div class="row mt-5">
            <div class="col-md-6 offset-md-3">
                <input type="text" id="itemInput" class="form-control mb-2" placeholder="Masukkan item belanja...">
                <button class="btn btn-primary w-100" onclick="addItem()">Tambah Item</button>
            </div>
        </div>
        
        <div class="row mt-5">
            <div class="col-md-6 offset-md-3">
                <ul id="itemList" class="list-group">
                </ul>
            </div>
        </div>
    </div>

    <script>
       
        function loadItems() {
            const items = JSON.parse(localStorage.getItem('catatanBelanja')) || [];
            const itemList = document.getElementById('itemList');
            itemList.innerHTML = '';
            
            items.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'list-group-item d-flex justify-content-between align-items-center';
                li.innerHTML = `
                    ${item}
                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${index})">Hapus</button>
                `;
                itemList.appendChild(li);
            });
        }
        
      
        function addItem() {
            const input = document.getElementById('itemInput');
            const item = input.value.trim();
            
            if (item === '') {
                alert('Masukkan item terlebih dahulu!');
                return;
            }
            
            const items = JSON.parse(localStorage.getItem('catatanBelanja')) || [];
            items.push(item);
            localStorage.setItem('catatanBelanja', JSON.stringify(items));
            
            input.value = '';
            loadItems();
        }
        
       
        function deleteItem(index) {
            const items = JSON.parse(localStorage.getItem('catatanBelanja')) || [];
            items.splice(index, 1);
            localStorage.setItem('catatanBelanja', JSON.stringify(items));
            loadItems();
        }
        
        // Muat items saat halaman dibuka
        loadItems();
    </script>
</body>
</html>
